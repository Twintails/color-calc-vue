name: Deploy to GitHub Pages

on:
  push:
    branches: [primary]
permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  pages: write

jobs:
  # Build Artifact job
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  # Upload Artifact job
  upload:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: distribute artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./dist

  # Deployment job
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, upload]
    if: github.ref == 'refs/heads/primary'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
